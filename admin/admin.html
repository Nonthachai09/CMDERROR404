<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin System - ระบบจองห้องประชุม</title>
  <style>
    :root{
      --SIDEBAR_W: 280px;
      --BG: #0b0f14;
      --BG2:#0a0d12;
      --CARD:#ffffff;
      --TEXT:#0d1117;
      --MUTED:#6b7280;
      --LINE:#e5e7eb;
      --ACCENT:#2f6bff;
      --ACCENT2:#3b82f6;
      --WHITE:#ffffff;
      --SOFT:#f7f8fb;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Leelawadee UI", Arial, sans-serif;
      background:#1c1f24;
      color:var(--TEXT);
    }

    .APP{
      height:100%;
      display:flex;
      justify-content:center;
      align-items:flex-start;
      padding:28px 18px;
    }

    .FRAME{
      width:min(1180px, 100%);
      min-height: 640px;
      display:flex;
      border-radius:10px;
      overflow:hidden;
      background:transparent;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
      border: 1px solid rgba(255,255,255,.06);
    }

    .SIDEBAR{
      width: var(--SIDEBAR_W);
      background: linear-gradient(180deg, #0b0f14 0%, #070a0f 100%);
      color: var(--WHITE);
      padding:22px 18px;
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    .BRAND{
      display:flex;
      flex-direction:column;
      gap:8px;
      padding:2px 4px 10px 4px;
    }

    .BRAND .TITLE{
      font-weight:800;
      font-size:22px;
      letter-spacing:.2px;
      line-height:1.1;
    }

    .BRAND .SUB{
      font-weight:800;
      font-size:20px;
      letter-spacing:.2px;
      line-height:1.1;
    }

    .MENU{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-top:6px;
    }

    .MENU_BTN{
      width:100%;
      display:flex;
      align-items:center;
      gap:12px;
      padding:12px 12px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,.10);
      background: transparent;
      color: rgba(255,255,255,.92);
      cursor:pointer;
      transition: .18s ease;
      font-size:14px;
    }

    .MENU_BTN:hover{
      background: rgba(255,255,255,.06);
      border-color: rgba(255,255,255,.16);
    }

    .MENU_BTN.ACTIVE{
      background: rgba(47,107,255,.22);
      border-color: rgba(47,107,255,.55);
      color: #ffffff;
      box-shadow: 0 10px 22px rgba(47,107,255,.16);
    }

    .ICONBOX{
      width:30px;
      height:30px;
      border-radius:8px;
      display:grid;
      place-items:center;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      flex: 0 0 auto;
    }

    .MENU_BTN.ACTIVE .ICONBOX{
      background: rgba(47,107,255,.34);
      border-color: rgba(47,107,255,.65);
    }

    .LABEL{
      text-align:left;
      font-weight:600;
      letter-spacing:.2px;
    }

    .SPACER{
      flex:1;
    }

    .LOGOUT{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding:12px 14px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.07);
      color: rgba(255,255,255,.95);
      cursor:pointer;
      transition:.18s ease;
      font-weight:700;
      font-size:13px;
    }

    .LOGOUT:hover{
      background: rgba(255,255,255,.10);
      border-color: rgba(255,255,255,.20);
    }

    .MAIN{
      flex:1;
      background: var(--CARD);
      padding:24px 28px;
      position:relative;
    }

    .TOPBAR{
      display:flex;
      justify-content:flex-end;
      align-items:center;
      gap:10px;
      margin-bottom: 22px;
    }

    .SEARCH_WRAP{
      display:flex;
      align-items:center;
      gap:10px;
      background: #0f2dff00;
    }

    .SEARCH{
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid var(--LINE);
      background: #ffffff;
      min-width: 360px;
      box-shadow: 0 6px 18px rgba(0,0,0,.06);
    }

    .SEARCH input{
      border:none;
      outline:none;
      width:100%;
      font-size:14px;
    }

    .BTN_PRIMARY{
      border:none;
      outline:none;
      cursor:pointer;
      padding:10px 14px;
      border-radius:10px;
      background: var(--ACCENT);
      color:#fff;
      font-weight:800;
      font-size:13px;
      box-shadow: 0 10px 24px rgba(47,107,255,.22);
      transition:.18s ease;
    }

    .BTN_PRIMARY:hover{
      background: #245cf2;
      transform: translateY(-1px);
    }

    .GRID{
      display:grid;
      grid-template-columns: 420px 1fr;
      gap: 34px;
      align-items:start;
    }

    .SECTION{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .H2{
      font-size:14px;
      font-weight:900;
      color:#111827;
      margin:0;
      letter-spacing:.2px;
    }

    .TABLE_BOX{
      width: 260px;
      border: 2px solid #222;
      background:#fff;
    }

    table{
      width:100%;
      border-collapse:collapse;
      font-size:12px;
    }

    th, td{
      padding:6px 8px;
      border-bottom:1px solid #222;
    }

    th{
      text-align:left;
      font-weight:800;
    }

    tr:last-child td{
      border-bottom:none;
    }

    .CHART_CARD{
      width: 360px;
      padding-top: 4px;
    }

    .SUBTEXT{
      color: var(--MUTED);
      font-size:12px;
      margin-top:-6px;
    }

    .CHART{
      margin-top: 6px;
      height: 220px;
      display:flex;
      align-items:flex-end;
      gap: 18px;
      padding: 12px 6px 6px 6px;
      border-radius: 12px;
      background: #ffffff;
    }

    .BARCOL{
      width: 30px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:8px;
      user-select:none;
    }

    .VAL{
      font-size:12px;
      font-weight:800;
      color:#2563eb;
      height:16px;
    }

    .BAR{
      width: 8px;
      border-radius: 10px;
      background: var(--ACCENT2);
      height: 10px;
      box-shadow: 0 10px 20px rgba(59,130,246,.18);
      transition: height .25s ease;
    }

    .DAY{
      font-size:11px;
      color:#111827;
      letter-spacing:.6px;
      margin-top:2px;
    }

    @media (max-width: 980px){
      .APP{ padding: 14px; }
      .FRAME{ border-radius: 12px; }
      .GRID{ grid-template-columns: 1fr; }
      .SEARCH{ min-width: 220px; width: 100%; }
      .TOPBAR{ justify-content:stretch; }
      .SEARCH_WRAP{ width:100%; }
      .BTN_PRIMARY{ white-space:nowrap; }
    }
  </style>
</head>
<body>
  <div class="APP">
    <div class="FRAME">
      <aside class="SIDEBAR">
        <div class="BRAND">
          <div class="TITLE">Admin System</div>
          <div class="SUB">ระบบจองห้องประชุม</div>
        </div>

        <nav class="MENU" id="MENU">
          <button class="MENU_BTN ACTIVE" type="button" data-page="overview">
            <span class="ICONBOX" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <path d="M4 6h16M4 12h16M4 18h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </span>
            <span class="LABEL">ภาพรวมระบบ</span>
          </button>

          <button class="MENU_BTN" type="button" data-page="rooms">
            <span class="ICONBOX" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <path d="M4 21V7a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M9 21V11h6v10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </span>
            <span class="LABEL">จัดการห้องประชุม</span>
          </button>

          <button class="MENU_BTN" type="button" data-page="bookings">
            <span class="ICONBOX" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <path d="M7 3v3M17 3v3M4 8h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M6 12h4M6 16h7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M4 8v13a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </span>
            <span class="LABEL">จัดการการจอง</span>
          </button>

          <button class="MENU_BTN" type="button" data-page="users">
            <span class="ICONBOX" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <path d="M20 21a8 8 0 0 0-16 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </span>
            <span class="LABEL">จัดการผู้ใช้</span>
          </button>
        </nav>

        <div class="SPACER"></div>

        <button class="LOGOUT" id="LOGOUT" type="button">
          <span aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <path d="M10 17l5-5-5-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M15 12H3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              <path d="M21 4v16a2 2 0 0 1-2 2h-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </span>
          Logout
        </button>
      </aside>

      <main class="MAIN">
        <div class="TOPBAR">
          <div class="SEARCH_WRAP">
            <div class="SEARCH">
              <span aria-hidden="true">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                  <path d="M21 21l-4.3-4.3" stroke="#111827" stroke-width="2" stroke-linecap="round"/>
                  <path d="M10.8 18a7.2 7.2 0 1 1 0-14.4 7.2 7.2 0 0 1 0 14.4Z" stroke="#111827" stroke-width="2"/>
                </svg>
              </span>
              <input id="SEARCH_INPUT" type="text" placeholder="ค้นหา..." />
            </div>
            <button class="BTN_PRIMARY" id="SEARCH_BTN" type="button">ค้นหา</button>
          </div>
        </div>

        <div class="GRID">
          <section class="SECTION">
            <h3 class="H2">จำนวนห้องประชุมทั้งหมด</h3>
            <div class="TABLE_BOX" role="region" aria-label="ตารางห้องประชุม">
              <table>
                <thead>
                  <tr>
                    <th>ชื่อห้อง</th>
                    <th>สถานะการจองห้อง</th>
                  </tr>
                </thead>
                <tbody id="ROOMS_TBODY">
                  <tr><td>ROOM101</td><td>ว่าง</td></tr>
                  <tr><td>ROOM102</td><td>ไม่ว่าง</td></tr>
                  <tr><td>ROOM103</td><td>ว่าง</td></tr>
                  <tr><td>ROOM104</td><td>ว่าง</td></tr>
                  <tr><td>ROOM105</td><td>ว่าง</td></tr>
                </tbody>
              </table>
            </div>
          </section>

          <section class="SECTION">
            <div class="CHART_CARD">
              <h3 class="H2">จำนวนการจองสัปดาห์นี้</h3>
              <div class="SUBTEXT" id="RANGE_TEXT">26 มกราคม - 1 กุมภาพันธ์</div>
              <div class="CHART" id="CHART"></div>
            </div>
          </section>
        </div>
      </main>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
