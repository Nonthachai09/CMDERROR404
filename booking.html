<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จองห้องประชุม | ระบบจองห้องประชุม</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Kanit', sans-serif;
        }

        body {
            background-color: #f5f5f5;
            padding-bottom: 50px;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: white;
            border-bottom: 1px solid #eee;
        }

        .booking-wrapper {
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .booking-card {
            width: 100%;
            max-width: 450px;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .booking-card h3 {
            text-align: center;
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-size: 14px;
            margin-top: 15px;
            color: #555;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: #2ecc71;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin-top: 25px;
            border-radius: 8px;
            font-weight: 500;
        }

        .btn-back {
            width: 100%;
            padding: 12px;
            background: #7f8c8d;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <div class="navbar">
        <div class="nav-title">จองห้องประชุม</div>
        <a href="H2.html" style="color: #333; text-decoration: none;"><i class="fa-solid fa-xmark"></i> ปิด</a>
    </div>

    <div class="booking-wrapper">
        <div class="booking-card">
            <h3>Room <span id="roomNoDisplay"></span></h3>

            <label>วัน / เดือน / ปี</label>
            <input type="date" id="date">

            <label>เวลาเริ่ม</label>
            <input type="time" id="start">

            <label>เวลาสิ้นสุด</label>
            <input type="time" id="end">

            <label>ชื่อ - นามสกุล</label>
            <input type="text" id="name">

            <label>เบอร์โทร</label>
            <input type="text" id="phone">

            <label>จำนวนผู้เข้าร่วม</label>
            <input type="number" id="attendees" min="1">

            <label>หมายเหตุ</label>
            <textarea id="note" rows="3"></textarea>

            <button class="btn-submit" onclick="confirmBooking()">ยืนยันการจอง</button>
            <button class="btn-back" onclick="history.back()">ย้อนกลับ</button>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const roomNo = params.get("room");
        document.getElementById("roomNoDisplay").innerText = roomNo;

        const roomCapacity = { "101": 35, "102": 9, "103": 16, "104": 12, "105": 10 };

        function confirmBooking() {
            const date = document.getElementById("date").value;
            const start = document.getElementById("start").value;
            const end = document.getElementById("end").value;
            const name = document.getElementById("name").value;
            const phone = document.getElementById("phone").value;
            const note = document.getElementById("note").value;
            const attendees = parseInt(document.getElementById("attendees").value);

            if (!date || !start || !end || !name || !attendees) {
                Swal.fire("กรอกข้อมูลให้ครบ", "", "warning"); return;
            }
            if (start >= end) {
                Swal.fire("เวลาไม่ถูกต้อง", "เวลาเริ่มต้องน้อยกว่าเวลาสิ้นสุด", "error"); return;
            }
            if (attendees > roomCapacity[roomNo]) {
                Swal.fire("คนเกินความจุ", `รับได้สูงสุด ${roomCapacity[roomNo]} คน`, "error"); return;
            }

            let bookings = JSON.parse(localStorage.getItem("bookings")) || [];

            const hasConflict = bookings.some(b =>
                b.room === roomNo && b.date === date &&
                ((start >= b.start && start < b.end) || (end > b.start && end <= b.end) || (start <= b.start && end >= b.end))
            );

            if (hasConflict) {
                Swal.fire("ช่วงเวลานี้ถูกจองแล้ว", "กรุณาเลือกช่วงเวลาอื่นในวันเดียวกัน", "error");
                return;
            }

            Swal.fire({
                title: 'ยืนยันการจอง?',
                text: `${date} เวลา ${start} - ${end}`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'ยืนยัน',
                confirmButtonColor: '#2ecc71'
            }).then((result) => {
                if (result.isConfirmed) {
                    bookings.push({ room: roomNo, date, start, end, name, phone, note, attendees });
                    localStorage.setItem("bookings", JSON.stringify(bookings));

                    Swal.fire({
                        title: 'จองสำเร็จ!',
                        text: 'กำลังพาท่านไปหน้าชำระเงิน...',
                        icon: 'success',
                        timer: 1500,
                        showConfirmButton: false
                    }).then(() => {
                        window.location.href = "payment.html";
                    });
                }
            });
        }
    </script>
</body>

</html>
